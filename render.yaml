services:
  - type: web
    name: textflow-backend
    env: node
    region: oregon
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: "production"
      - key: CORS_ORIGIN
        value: "https://textflow.onrender.com"
      - fromGroup: textflow-secrets
